spring:
  main:
    allow-bean-definition-overriding: true
    register-shutdown-hook: false
  datasource:
    hikari:
      maximum-pool-size: 10

# CR-11: Explicit system-datasource config for test profile.
# Testcontainers uses the same superuser for all roles — this prevents
# the CR-4 fail-fast guard from rejecting empty credentials at startup.
application:
  jwt:
    secret: ${JWT_SECRET:test-only-jwt-secret-key-not-for-production-min-256-bits-long}
  system-datasource:
    enabled: true
    username: ${spring.datasource.username:test}
    password: ${spring.datasource.password:test}
  email:
    outbox:
      worker-enabled: false
      dead-letter-monitor-enabled: false

org:
  jobrunr:
    background-job-server:
      enabled: false
    dashboard:
      enabled: false

logging:
  level:
    com.fabricmanagement.common.infrastructure.persistence.TenantConnectionProvider: TRACE
    com.fabricmanagement.common.infrastructure.config.TenantRestoringEventListenerAspect: TRACE
    com.fabricmanagement.common.infrastructure.persistence.SystemTransactionExecutor: DEBUG

management:
  otlp:
    tracing:
      export:
        enabled: false

# OpenApiExportIT requires springdoc enabled to fetch /api-docs.yaml.
# Default profile disables it for security (CVE mitigations for swagger-ui/DOMPurify).
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
