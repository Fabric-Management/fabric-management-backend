spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    hikari:
      maximum-pool-size: 10

# CR-11: Explicit system-datasource config for test profile.
# Testcontainers uses the same superuser for all roles — this prevents
# the CR-4 fail-fast guard from rejecting empty credentials at startup.
application:
  system-datasource:
    enabled: true
    username: ${spring.datasource.username:test}
    password: ${spring.datasource.password:test}

logging:
  level:
    com.fabricmanagement.common.infrastructure.persistence.TenantConnectionProvider: TRACE
    com.fabricmanagement.common.infrastructure.config.TenantRestoringEventListenerAspect: TRACE
    com.fabricmanagement.common.infrastructure.persistence.SystemTransactionExecutor: DEBUG

management:
  otlp:
    tracing:
      export:
        enabled: false
