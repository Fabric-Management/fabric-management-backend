spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fabric_management}?stringtype=unspecified}
    username: ${POSTGRES_APP_USER:fabric_app}
    password: ${POSTGRES_APP_PASSWORD:app_dev_2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fabric-management-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  mail:
    host: ${MAIL_HOST:smtp.hostinger.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:info@storeandsale.shop}
    password: ${MAIL_PASSWORD:Akk789987@}
    protocol: ${MAIL_PROTOCOL:smtps}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:true}
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.hostinger.com}
          from: ${MAIL_SMTP_FROM:${MAIL_FROM_EMAIL:${MAIL_USERNAME:}}}
          "auth.mechanisms": ${MAIL_SMTP_AUTH_MECHANISMS:LOGIN PLAIN}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    out-of-order: false  # Reproducible order, no warning. New migrations must use version > current max (e.g. V20260308150000).
    default-schema: common_tenant
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:fabric_management}}
    user: ${POSTGRES_OWNER_USER:fabric_owner}
    password: ${POSTGRES_OWNER_PASSWORD:owner_dev_2026}

  jpa:
    show-sql: false  # SQL loglarını kapat (çok fazla log üretiyor)
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false  # SQL formatlamayı kapat

logging:
  level:
    root: INFO
    com.fabricmanagement: INFO  # DEBUG yerine INFO - daha az log
    com.fabricmanagement.platform.communication.app.EmailOutboxService: WARN  # Email worker loglarını azalt
    org.springframework.web: WARN  # Sadece uyarılar
    org.springframework.security: INFO  # DEBUG yerine INFO
    org.hibernate.SQL: OFF  # SQL loglarını tamamen kapat (çok fazla log üretiyor)
    org.hibernate.type.descriptor.sql.BasicBinder: OFF  # Parameter binding'i kapat
    org.hibernate.orm.jdbc.bind: OFF  # JDBC binding loglarını kapat
    org.hibernate.stat: OFF  # Hibernate statistics loglarını kapat
    org.springframework.web.servlet.DispatcherServlet: WARN  # DispatcherServlet loglarını azalt
    org.springframework.scheduling: WARN  # Scheduled task loglarını azalt

server:
  port: ${LOCAL_SERVER_PORT:8081}

# Retention jobs are opt-in for local development.
retention:
  quote:
    enabled: ${QUOTE_RETENTION_ENABLED:false}

application:
  jwt:
    secret: local-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expiration: 3600000 # 1 hour for local development
    playground-expiration: 1209600000 # 14 days for playground demo sessions
    refresh-expiration: 2592000000 # 30 days for local development

  # Auth cookies: Secure=false so cookies work over http://localhost
  auth:
    cookie:
      secure: false

  # System DataSource: fabric_system role (BYPASSRLS) for cross-tenant operations
  system-datasource:
    enabled: true
    username: ${POSTGRES_SYSTEM_USER:fabric_system}
    password: ${POSTGRES_SYSTEM_PASSWORD:system_dev_2026}

  mail:
    from-email: ${MAIL_FROM_EMAIL:info@storeandsale.shop}
    from-name: ${MAIL_FROM_NAME:Fabricode}

  email:
    outbox:
      worker-enabled: ${EMAIL_OUTBOX_WORKER_ENABLED:true}
      poll-interval-ms: ${EMAIL_OUTBOX_POLL_INTERVAL_MS:15000}
      reclaim-after-minutes: ${EMAIL_OUTBOX_RECLAIM_AFTER_MINUTES:15}
      reclaim-interval-ms: ${EMAIL_OUTBOX_RECLAIM_INTERVAL_MS:300000}
      dead-letter-monitor-enabled: ${EMAIL_OUTBOX_DEAD_LETTER_MONITOR_ENABLED:false}

  frontend:
    base-url: ${FRONTEND_URL:${APP_BASE_URL:http://localhost:3000}}

  seed:
    demo-transactions:
      enabled: true

  # Google Maps Platform Configuration
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
      enabled: ${GOOGLE_MAPS_ENABLED:true}
      timeout: ${GOOGLE_MAPS_TIMEOUT:10000}
      region-bias: ${GOOGLE_MAPS_REGION_BIAS:TR,GB,DE,FR,IT,ES}

  # WhatsApp Business API Configuration
  whatsapp:
    enabled: ${PLATFORM_WHATSAPP_ENABLED:false}
    business-api-url: ${PLATFORM_WHATSAPP_API_URL:https://graph.facebook.com}
    business-api-token: ${PLATFORM_WHATSAPP_ACCESS_TOKEN:}
    phone-number-id: ${PLATFORM_WHATSAPP_PHONE_NUMBER_ID:}
    verification-template-name: ${PLATFORM_WHATSAPP_VERIFICATION_TEMPLATE:verification_code}
    webhook-verify-token: ${PLATFORM_WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
    timeout: ${PLATFORM_WHATSAPP_TIMEOUT:5000}
    app-secret: ${PLATFORM_WHATSAPP_APP_SECRET:}
    webhook-signature-enabled: ${PLATFORM_WHATSAPP_WEBHOOK_SIGNATURE_ENABLED:false}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
