# Flyway config for Maven plugin (migrate, repair, validate, info).
# Used when running: mvn flyway:migrate, mvn flyway:repair, etc.
# Defaults match application-local.yml. Override with -Dflyway.url=... etc.

flyway.url=jdbc:postgresql://localhost:5432/fabric_management
flyway.user=fabric_owner
flyway.password=owner_dev_2026
flyway.locations=filesystem:src/main/resources/db/migration
flyway.baselineOnMigrate=true
# outOfOrder=false: reproducible migrations, no warning. New migrations must have version > current max.
flyway.outOfOrder=false
flyway.schemas=common_tenant
