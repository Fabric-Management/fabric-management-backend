<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
    <title>{{heading}}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Helvetica Neue', Arial, sans-serif;
      background-color: #f9fafb;
    ">
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 0;
      ">
      <div
        style="
          background-color: #0f172a;
          padding: 40px 32px;
          text-align: center;
        ">
        <p style="color: #ffffff; font-size: 24px; font-weight: 700; margin: 0">
          Fabricode OS
        </p>
      </div>

      <div style="padding: 64px 32px 56px 32px; background-color: #ffffff">
        <h1
          style="
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            margin-top: 0;
            margin-bottom: 12px;
            text-align: center;
          ">
          {{heading}}
        </h1>

        <div
          style="
            background: #f3f4f6;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 24px;
            margin: 0 0 16px 0;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
          ">
          <p
            style="
              font-size: 16px;
              line-height: 1.6;
              color: #374151;
              margin: 0;
            ">
            {{body}}
          </p>

          <div
            style="
              margin-top: 20px;
              padding-top: 20px;
              border-top: 1px solid #e5e7eb;
            ">
            <p
              style="
                font-size: 14px;
                line-height: 1.6;
                color: #64748b;
                margin: 0;
              ">
              {{expires}}
            </p>
          </div>
        </div>

        <div style="width: 100%; margin: 0 0 24px 0; padding: 0">
          <a
            href="{{approvalUrl}}"
            style="
              display: block;
              width: 100%;
              background-color: #0f172a;
              color: #ffffff;
              font-size: 16px;
              font-weight: 500;
              padding: 12px 24px;
              border-radius: 8px;
              text-decoration: none;
              text-align: center;
              border: none;
              box-sizing: border-box;
              margin: 0;
            ">
            {{cta}}
          </a>
        </div>
      </div>

      <div style="border-top: 1px solid #e5e7eb; margin: 32px 0"></div>
      <div style="padding: 0 32px 32px; text-align: center">
        <p style="font-size: 12px; color: #6b7280; margin: 0 0 8px 0">
          © 2024 Fabricode OS. All rights reserved.
        </p>
        <p style="font-size: 12px; color: #9ca3af; margin: 0">
          This email was sent to you as part of your Fabricode OS account notifications.
        </p>
      </div>
    </div>
  </body>
</html>
