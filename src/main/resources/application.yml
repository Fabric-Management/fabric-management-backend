modulith:
  events:
    stuck-monitor:
      enabled: true
      interval-ms: 60000
      threshold-minutes: 10

spring:
  application:
    name: fabric-management-system

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  modulith:
    events:
      republish-outstanding-events-on-restart: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        use_sql_comments: ${HIBERNATE_USE_COMMENTS:true}
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:20}
        order_inserts: ${HIBERNATE_ORDER_INSERTS:true}
        order_updates: ${HIBERNATE_ORDER_UPDATES:true}
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    default-schema: common_tenant

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=${CACHE_MAX_SIZE:10000},expireAfterWrite=${CACHE_EXPIRE_SECONDS:300}s

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}
      file-size-threshold: ${MULTIPART_FILE_SIZE_THRESHOLD:2MB}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:true}
    mime-types: ${SERVER_COMPRESSION_MIME_TYPES:text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json}
    min-response-size: ${SERVER_COMPRESSION_MIN_SIZE:1024}

# Management & Actuator
management:
  tracing:
    enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Application Info
info:
  app:
    name: ${spring.application.name}
    description: ${APP_DESCRIPTION:Modular Monolith Fabric Management System}
    version: ${APP_VERSION:1.0.0}
    architecture: ${APP_ARCHITECTURE:Modular Monolith}
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}

# Logging
logging:
  level:
    root: INFO
    com.fabricmanagement: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    # Reduce log noise from background jobs
    com.fabricmanagement.platform.communication.app.EmailOutboxService: INFO

# Auth module configuration (lockout, verification, password)
auth:
  lockout:
    max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
    lock-duration: ${AUTH_LOCKOUT_DURATION:30m}
  verification:
    code-length: ${AUTH_VERIFICATION_CODE_LENGTH:6}
    code-expiry: ${AUTH_VERIFICATION_CODE_EXPIRY:10m}
    max-attempts: ${AUTH_VERIFICATION_MAX_ATTEMPTS:3}
  password:
    bcrypt-strength: ${AUTH_BCRYPT_STRENGTH:10}
  mfa:
    rate-limit:
      max-attempts: ${AUTH_MFA_RATE_LIMIT_MAX_ATTEMPTS:5}
      lockout-seconds: ${AUTH_MFA_RATE_LIMIT_LOCKOUT_SECONDS:900}

# Application Properties
application:
  name: Fabric Management System
  version: 1.0.0
  architecture: modular-monolith

  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:900000} # 15 minutes
    playground-expiration: ${JWT_PLAYGROUND_EXPIRATION:1209600000} # 14 days
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

  trial:
    base-days: ${TRIAL_BASE_DAYS:90}
    dormancy-window-days: ${TRIAL_DORMANCY_WINDOW_DAYS:90}
    hard-cap-months: ${TRIAL_HARD_CAP_MONTHS:4}
    read-only:
      allow-paths:
        - /api/v1/auth/**
        - /api/v1/public/**
        - /api/v1/subscriptions/*/activate
        - /api/v1/subscriptions/**/activate

  # Auth cookies (HttpOnly). Set secure=false for local HTTP (e.g. http://localhost).
  auth:
    cookie:
      secure: ${AUTH_COOKIE_SECURE:true}

  # Tenant Configuration
  tenant:
    default-tenant-id: ${DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000000}

  # Mail Configuration
  mail:
    from-email: ${MAIL_FROM_EMAIL:noreply@fabricmanagement.com}
    from-name: ${MAIL_FROM_NAME:Fabric Management}

  # Stuck-follow-up feedback reports (EVENT-VISIBILITY-1): where the "Report this"
  # button sends its bug report. Override per environment via EVENT_VISIBILITY_OPS_EMAIL.
  event-visibility:
    ops-email: ${EVENT_VISIBILITY_OPS_EMAIL:akkaya064@gmail.com}

  # Email Template Configuration
  # Note: Frontend pi email render endpoint removed - backend uses its own HTML templates
  email:
    # Template provider: "auto" (smart fallback), "frontend", or "backend"
    template-provider: ${EMAIL_TEMPLATE_PROVIDER:backend} # ✅ Backend templates only (frontend endpoint removed)
    frontend:
      enabled: ${EMAIL_FRONTEND_ENABLED:false} # ✅ Disabled (frontend endpoint removed)
      timeout-ms: ${EMAIL_FRONTEND_TIMEOUT_MS:5000}
      url: ${FRONTEND_URL:${APP_BASE_URL:http://localhost:3000}}
    # Transactional Outbox pattern: Save emails to DB before sending (ensures persistence and retry)
    use-outbox: ${EMAIL_USE_OUTBOX:true} # ✅ Enabled by default for reliable email delivery
    # Dead letter queue alert threshold (alert admin when failed email count exceeds this)
    dead-letter-alert-threshold: ${EMAIL_DEAD_LETTER_ALERT_THRESHOLD:5} # Alert when 5+ failed emails
    outbox:
      worker-enabled: ${EMAIL_OUTBOX_WORKER_ENABLED:true}
      poll-interval-ms: ${EMAIL_OUTBOX_POLL_INTERVAL_MS:5000}
      reclaim-after-minutes: ${EMAIL_OUTBOX_RECLAIM_AFTER_MINUTES:15}
      reclaim-interval-ms: ${EMAIL_OUTBOX_RECLAIM_INTERVAL_MS:300000}
      dead-letter-monitor-enabled: ${EMAIL_OUTBOX_DEAD_LETTER_MONITOR_ENABLED:true}
      dead-letter-cron: ${EMAIL_OUTBOX_DEAD_LETTER_CRON:0 0 * * * ?}

  frontend:
    base-url: ${FRONTEND_URL:${APP_BASE_URL:http://localhost:3000}}

  # AI Configuration
  ai:
    enabled: ${AI_ENABLED:true}
    provider: ${AI_PROVIDER:openai} # openai | anthropic | local
    api-key: ${OPENAI_API_KEY:${AI_API_KEY:}} # From .env (supports both OPENAI_API_KEY and AI_API_KEY)
    model: ${AI_MODEL:gpt-4o-mini} # gpt-4o-mini | claude-3-haiku
    temperature: ${AI_TEMPERATURE:0.7}
    max-tokens: ${AI_MAX_TOKENS:1000}
    timeout: ${AI_TIMEOUT:30000} # 30 seconds
    cache-enabled: ${AI_CACHE_ENABLED:true}
    cache-ttl-seconds: ${AI_CACHE_TTL_SECONDS:300}
    max-context-tokens: ${AI_MAX_CONTEXT_TOKENS:1500} # Reduced from 2000 to save tokens

  # Verification Configuration
  verification:
    code-length: 6
    code-expiry-minutes: 10
    max-attempts: 3
    resend-delay-seconds: 60

  # Policy Configuration
  policy:
    cache-ttl-seconds: 300 # 5 minutes
    default-decision: DENY
    evaluation-timeout-ms: 1000

  # Event Configuration
  events:
    async-enabled: true
    outbox-enabled: true
    outbox-batch-size: 100
    outbox-poll-interval-ms: 5000

  # Google Maps Platform Configuration
  google:
    maps:
      api-key: ${GOOGLE_MAPS_API_KEY:}
      enabled: ${GOOGLE_MAPS_ENABLED:true}
      timeout: ${GOOGLE_MAPS_TIMEOUT:10000}
      region-bias: ${GOOGLE_MAPS_REGION_BIAS:TR,GB,DE,FR,IT,ES}
      max-result-count: ${GOOGLE_MAPS_MAX_RESULT_COUNT:20} # what3words-style: show all matching addresses (1-20)

  # WhatsApp Business API Configuration
  whatsapp:
    enabled: ${WHATSAPP_ENABLED:false}
    business-api-url: ${WHATSAPP_API_URL:https://graph.facebook.com}
    business-api-token: ${WHATSAPP_API_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    verification-template-name: ${WHATSAPP_VERIFICATION_TEMPLATE:verification_code}
    timeout: ${WHATSAPP_TIMEOUT:5000}
    app-secret: ${WHATSAPP_APP_SECRET:}
    webhook-signature-enabled: ${WHATSAPP_WEBHOOK_SIGNATURE_ENABLED:true}

  # Batch certification expiry warning (scheduled job)
  batch-certification:
    expiry-warning-days: ${BATCH_CERT_EXPIRY_WARNING_DAYS:30}
    expiry-check-cron: ${BATCH_CERT_EXPIRY_CHECK_CRON:0 0 2 * * ?}

# Batch certification enforcement (reserve / start-production)
# When true, organic FIBER batches must have a valid GOTS cert (validUntil null or >= today).
batch:
  certification:
    enforce-on-reserve: ${BATCH_CERT_ENFORCE_ON_RESERVE:true}

# Quote transient-data retention. Local development overrides this to disabled.
retention:
  quote:
    enabled: ${QUOTE_RETENTION_ENABLED:true}
    abandonedDraftDays: ${QUOTE_RETENTION_ABANDONED_DRAFT_DAYS:90}
    deadTokenDays: ${QUOTE_RETENTION_DEAD_TOKEN_DAYS:365}
    cron: ${QUOTE_RETENTION_CRON:0 30 3 * * ?}

# Feature Flags
feature:
  trading-partner:
    # Legacy Company fallback - disabled after Faz 3 migration
    # All partner data now in TradingPartner table
    legacy-fallback: ${FEATURE_TRADING_PARTNER_LEGACY_FALLBACK:false}

# OpenAPI / Swagger
springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false
  writer-with-order-by-keys: true

# JobRunr — DDL disabled; tables pre-created by Flyway (owner role)
org:
  jobrunr:
    database:
      skip-create: true
      table-prefix: "public."
    background-job-server:
      enabled: true
    dashboard:
      enabled: false

costing:
  fx:
    max-stale-days: 7
    ecb:
      enabled: true
      timeout-seconds: 5
    tcmb:
      enabled: false
