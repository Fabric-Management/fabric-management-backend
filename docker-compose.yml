# ==============================================
# FABRIC MANAGEMENT - MODULAR MONOLITH
# ==============================================
# Infrastructure services only
# Application runs externally (IntelliJ or make app-run)
# Updated: 2025-10-25

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  fabric-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:

services:
  # ==============================================
  # APPLICATION - Fabric Management Backend
  # ==============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.service
    container_name: fabric-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${SERVER_PORT:-8080}
      POSTGRES_DB: ${POSTGRES_DB:?error}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:?error}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?error}
      POSTGRES_OWNER_USER: ${POSTGRES_OWNER_USER:?error}
      POSTGRES_OWNER_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?error}
      POSTGRES_HOST: ${POSTGRES_CONTAINER_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_CONTAINER_PORT:-5432}
      DATABASE_URL: ${DATABASE_URL_CONTAINER:-jdbc:postgresql://${POSTGRES_CONTAINER_HOST:-postgres}:${POSTGRES_CONTAINER_PORT:-5432}/${POSTGRES_DB:?error}}
      MAIL_HOST: ${MAIL_HOST:-smtp.hostinger.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:?error}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?error}
      MAIL_PROTOCOL: ${MAIL_PROTOCOL:-smtps}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-false}
      MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-false}
      MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-true}
      MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-smtp.hostinger.com}
      MAIL_SMTP_FROM: ${MAIL_SMTP_FROM:-}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Fabricode}
      MAIL_SMTP_AUTH_MECHANISMS: ${MAIL_SMTP_AUTH_MECHANISMS:-LOGIN PLAIN}
      MAIL_SMTP_CONNECTION_TIMEOUT: ${MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      MAIL_SMTP_TIMEOUT: ${MAIL_SMTP_TIMEOUT:-5000}
      MAIL_SMTP_WRITE_TIMEOUT: ${MAIL_SMTP_WRITE_TIMEOUT:-5000}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - fabric-network
    logging: *default-logging

  # ==============================================
  # DATABASE - PostgreSQL 15
  # ==============================================
  postgres:
    image: postgres:15-alpine
    container_name: fabric-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_OWNER_USER:?error}
      POSTGRES_PASSWORD: ${POSTGRES_OWNER_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:?error}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?error}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/docker-init-roles.sh:/docker-entrypoint-initdb.d/01-init-roles.sh
    networks:
      - fabric-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_OWNER_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging

  # ==============================================
  # MESSAGE BROKER - Kafka & Zookeeper (Optional)
  # ==============================================
  # YAGNI: Not needed for development phase
  # Spring Events handles in-process events
  # Uncomment when ready for external event streaming

