name: CI - Code Quality & Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Format code
        run: mvn fmt:check

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Run SpotBugs
        run: mvn spotbugs:check

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('pom.xml', 'dependency-check-suppression.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Validate NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "::error::NVD_API_KEY repository secret is required for the blocking Dependency-Check gate."
            exit 1
          fi

      - name: Run Security Scan (Dependency Check)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        # Resilient to NVD API outages: nvdValidForHours=168 reuses cached NVD data for 7 days
        # (so a warm cache never re-contacts NVD), nvdApiDelay throttles to avoid 429/503 rate
        # limits, and the loop retries transient NVD 5xx failures before failing the gate.
        run: |
          set -e
          for attempt in 1 2 3; do
            if mvn org.owasp:dependency-check-maven:check \
                -DfailBuildOnCVSS=7 \
                -DdataDirectory="${HOME}/.m2/dependency-check-data" \
                -DskipProvidedScope=true \
                -DsuppressionFile=dependency-check-suppression.xml \
                -DnvdApiKey="${NVD_API_KEY}" \
                -DnvdValidForHours=168 \
                -DnvdApiDelay=6000; then
              echo "Dependency-Check passed on attempt ${attempt}."
              exit 0
            fi
            echo "::warning::Dependency-Check attempt ${attempt} failed (likely NVD API 5xx). Retrying in 60s..."
            sleep 60
          done
          echo "::error::Dependency-Check failed after 3 attempts — NVD API likely unavailable. Re-run once NVD recovers."
          exit 1

      - name: Upload Checkstyle results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-results
          path: target/checkstyle-result.xml
          if-no-files-found: ignore

      - name: Upload SpotBugs results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-results
          path: target/spotbugsXml.xml
          if-no-files-found: ignore

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Testcontainers uses Docker daemon directly, no explicit service needed.
    # requires: docker
    needs: code-quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        run: mvn clean verify

      - name: Generate test report
        if: always()
        run: |
          mvn surefire-report:report-only
          mvn failsafe:report-only || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: target/site/jacoco
          if-no-files-found: ignore
