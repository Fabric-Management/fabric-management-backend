name: CI - Backend Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Verify formatting
        run: ./mvnw fmt:check

      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

      - name: Run blocking SpotBugs analysis
        run: ./mvnw spotbugs:check

      - name: Upload Checkstyle results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: checkstyle-results
          path: target/checkstyle-result.xml
          if-no-files-found: ignore

      - name: Upload SpotBugs results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-results
          path: target/spotbugsXml.xml
          if-no-files-found: ignore

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Cache Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/dependency-check-data
          key: ${{ runner.os }}-dependency-check-${{ hashFiles('pom.xml', 'dependency-check-suppression.xml') }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-

      - name: Validate NVD API key
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          if [ -z "${NVD_API_KEY}" ]; then
            echo "::error::NVD_API_KEY repository secret is required for the blocking Dependency-Check gate."
            exit 1
          fi

      - name: Run blocking dependency vulnerability scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          set -e
          for attempt in 1 2 3; do
            if ./mvnw org.owasp:dependency-check-maven:check \
                -DfailBuildOnCVSS=7 \
                -DdataDirectory="${HOME}/.m2/dependency-check-data" \
                -DskipProvidedScope=true \
                -DsuppressionFile=dependency-check-suppression.xml \
                -DnvdApiKey="${NVD_API_KEY}" \
                -DnvdValidForHours=168 \
                -DnvdApiDelay=6000; then
              echo "Dependency-Check passed on attempt ${attempt}."
              exit 0
            fi
            echo "::warning::Dependency-Check attempt ${attempt} failed. Retrying in 60s..."
            sleep 60
          done
          echo "::error::Dependency-Check failed after 3 attempts."
          exit 1

      - name: Upload dependency vulnerability report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-results
          path: target/dependency-check-report.*
          if-no-files-found: ignore

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    # Testcontainers uses the runner's Docker daemon; no explicit service is needed.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit, integration and coverage gates
        run: ./mvnw clean verify -Pcoverage

      - name: Print test failures
        if: always()
        run: |
          echo "=== Surefire/Failsafe failure summary ==="
          grep -R -n -E "<failure|<error" target/surefire-reports target/failsafe-reports 2>/dev/null || true

          echo "=== Failing text reports ==="
          for reports_dir in target/surefire-reports target/failsafe-reports; do
            if [ ! -d "${reports_dir}" ]; then
              echo "No ${reports_dir} directory."
              continue
            fi

            for report in "${reports_dir}"/*.txt; do
              [ -e "${report}" ] || continue
              if grep -q -E "<<< FAILURE!|<<< ERROR!" "${report}"; then
                echo "---- ${report} ----"
                sed -n '1,300p' "${report}" || true
              fi
            done
          done

      - name: Generate test report
        if: always()
        run: |
          ./mvnw surefire-report:report-only || true
          ./mvnw surefire-report:failsafe-report-only || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: ignore

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: target/site/jacoco
          if-no-files-found: ignore

  container-build:
    name: Container Build
    if: github.event_name == 'pull_request'
    needs: [code-quality, security, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Verify production container build without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.service
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=backend-container
          cache-to: type=gha,mode=max,scope=backend-container
