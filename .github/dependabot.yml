version: 2

updates:
  - package-ecosystem: maven
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      maven-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/"
    target-branch: main
    schedule:
      interval: monthly
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(container)"
