version: 2

updates:
  - package-ecosystem: maven
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      maven-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "org.springframework.cloud:spring-cloud-dependencies"
          # JSONB serialization changes need their own focused compatibility PR.
          - "io.hypersistence:hypersistence-utils-hibernate-63"
        update-types:
          - minor
          - patch
    # Spring Cloud uses CalVer release trains: 2025.1 requires Spring Boot 4.x.
    # Keep the project on the Boot 3.5-compatible 2025.0 train until a coordinated upgrade.
    ignore:
      - dependency-name: "org.springframework.cloud:spring-cloud-dependencies"
        versions:
          - "[2025.1,)"
      # Major framework/library upgrades require a dedicated migration ticket.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
      # 3.15.4 rejects the project's non-Serializable JSONB spec records at runtime.
      - dependency-name: "io.hypersistence:hypersistence-utils-hibernate-63"
        versions:
          - "[3.15,)"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: "/"
    target-branch: main
    schedule:
      interval: monthly
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 3
    ignore:
      # Dependabot mixes the Maven and JDK versions in this tag. Keep the builder
      # on the Java 21 image line and update it manually as a coordinated change.
      - dependency-name: "maven"
      # The runtime remains on the Java 21 LTS line.
      - dependency-name: "eclipse-temurin"
        update-types:
          - "version-update:semver-major"
    commit-message:
      prefix: "chore(container)"
