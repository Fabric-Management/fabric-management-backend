    BatchDto:
      type: object
      description: Response object representing a product batch in the system
      properties:
        attributes:
          type: object
          additionalProperties: true
          description: Raw JSONB attributes map. Prefer using fiberSpecs/yarnSpecs
            when available.
        availableQuantity:
          type: number
          description: Calculated available quantity (quantity - reserved - consumed
            - waste)
        batchCode:
          type: string
          description: Internal unique batch code/lot number
          example: B-2026-001
        composition:
          type: object
          additionalProperties:
            type: number
          description: Resolved composition. Map of Base Fiber ID to percentage. Empty
            for pure fibers.
        consumedQuantity:
          type: number
          description: Quantity consumed in production
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        expiryDate:
          type: string
          format: date-time
          description: Expiration date if applicable
        fiberSpecs:
          $ref: "#/components/schemas/FiberAttributes"
          description: Detailed specifications for FIBER batches. Null for other product
            types.
        id:
          type: string
          format: uuid
          description: Unique batch ID
        isActive:
          type: boolean
          description: Whether the batch is active (not soft-deleted)
        locationId:
          type: string
          format: uuid
          description: ID of the warehouse location where the batch is stored
        netOutputQuantity:
          type: number
          description: Net output quantity (if applicable)
        parentBatchId:
          type: string
          format: uuid
          description: ID of the parent batch if this was split/transferred
        productId:
          type: string
          format: uuid
          description: ID of the parent product this batch belongs to
        productType:
          type: string
          description: "Type of the product (FIBER, YARN, FABRIC)"
          enum:
          - FIBER
          - YARN
          - FABRIC
          - CHEMICAL
          - CONSUMABLE
        productionDate:
          type: string
          format: date-time
          description: Date when the batch was produced
        qualityStandardId:
          type: string
          format: uuid
          description: ID of the quality standard applied to this batch
        quantity:
          type: number
          description: Initial quantity of the batch
        remarks:
          type: string
          description: Additional remarks/notes
        reservedQuantity:
          type: number
          description: Quantity currently reserved for active orders
        status:
          type: string
          description: "Current lifecycle status of the batch (e.g., AVAILABLE, QUARANTINE,\
            \ CONSUMED)"
          enum:
          - PENDING_QC
          - QUARANTINE
          - AVAILABLE
          - ON_HOLD
          - RESERVED
          - IN_PROGRESS
          - DEPLETED
          - QC_REJECTED
          - RETURNED
          - DESTROYED
        supplierBatchCode:
          type: string
          description: Supplier's batch code/lot number
          example: SUP-L44
        tenantId:
          type: string
          format: uuid
          description: Tenant ID
        uid:
          type: string
          description: Human-readable unique identifier
          example: BAT-2026-0001
        unit:
          type: string
          description: "Unit of measure (e.g., KG, MTR)"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        version:
          type: integer
          format: int64
          description: Optimistic locking version
        wastePercentage:
          type: number
          description: Waste percentage calculated automatically
        wasteQuantity:
          type: number
          description: Quantity declared as waste
        yarnSpecs:
          $ref: "#/components/schemas/YarnAttributes"
          description: Detailed specifications for YARN batches. Null for other product
            types.
