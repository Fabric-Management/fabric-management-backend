  /api/v1/production/work-orders:
    get:
      description: Returns a paginated list of WorkOrders for the current tenant.
        All filter parameters are optional. Combine with Pageable for sorting.
      operationId: listWorkOrders
      parameters:
      - description: Filter by status
        in: query
        name: status
        required: false
        schema:
          type: string
          enum:
          - DRAFT
          - PENDING_APPROVAL
          - APPROVED
          - REJECTED
          - SENT
          - IN_PROGRESS
          - COMPLETED
          - CANCELLED
      - description: Filter by module type
        in: query
        name: moduleType
        required: false
        schema:
          type: string
          enum:
          - SPINNING
          - WEAVING
          - KNITTING
          - DYEING
          - FINISHING
          - GENERIC
      - description: Filter by customer/supplier
        in: query
        name: tradingPartnerId
        required: false
        schema:
          type: string
          format: uuid
      - description: Filter by sales order
        in: query
        name: salesOrderId
        required: false
        schema:
          type: string
          format: uuid
      - description: Filter by recipe
        in: query
        name: recipeId
        required: false
        schema:
          type: string
          format: uuid
      - description: Partial match on WO number or product code
        in: query
        name: searchText
        required: false
        schema:
          type: string
      - description: Deadline range start (ISO 8601)
        in: query
        name: deadlineFrom
        required: false
        schema:
