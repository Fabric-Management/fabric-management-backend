paths:
  /api/v1/admin/onboarding/tenant:
    post:
      description: "Creates a new tenant and organization, admin user, selected OS\
        \ subscriptions (trial), and registration token. Sends welcome email to admin\
        \ with setup link. In production this endpoint should be protected with PLATFORM_ADMIN\
        \ role."
      operationId: createTenant
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantOnboardingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantOnboardingResponse"
          description: Tenant created successfully; welcome email sent to admin
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Not Found
        "409":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Conflict
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Unprocessable Entity
        "429":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Too Many Requests
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiProblemDetail"
          description: Internal Server Error
      summary: Create tenant (sales-led)
      tags:
      - Tenant Onboarding (Admin)
